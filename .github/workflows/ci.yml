name: Code Check # название

on: [push, pull_request] # запускать при любом пуше в любую ветку и при создании пулл реквеста

jobs: # то что делает пайплайн
  check_html: # название задачи
    runs-on: ubuntu-latest # запуск на ласт версии убунту

    steps: # последовательность шагов
      # 1: получать код из репозитория
      - name: Checkout code
        uses: actions/checkout@v4 # загрузка кода 

      # 2: установка Node.js для проверки
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3: проверка html с помощью html-proofer
      - name: Setup HTMLProofer
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby-full
          sudo gem install html-proofer

      - name: Run HTMLProofer
        run: |
          htmlproofer . --checks html --disable-external --allow-hash-href
  notify-telegram:
    runs-on: ubuntu-latest
    name: Telegram Notification
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@v0.1.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 CI/CD Status
            --------------------------
            📁 Repository: ${{ github.repository }}
            🔖 Branch: ${{ github.ref_name }}
            👤 Author: ${{ github.actor }}
            --------------------------
            📊 Status: ${{ job.status }}
            ✅ Quality Checks: ${{ needs.quality-checks.result }}
            --------------------------
            🔗 View Results: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            🌐 Live Site: https://${{ github.repository }}.vercel.app
          format: html
